version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: financial_db
    environment:
      POSTGRES_USER: financialuser
      POSTGRES_PASSWORD: financialpass
      POSTGRES_DB: financial_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financialuser -d financial_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financial_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://financialuser:financialpass@db:5432/financial_db
      SYNC_DATABASE_URL: postgresql://financialuser:financialpass@db:5432/financial_db
      ENVIRONMENT: development
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://frontend:80
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: financial_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
